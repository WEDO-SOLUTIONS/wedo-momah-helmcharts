# Production environment values for zero-release-api
name: zero-release-api
namespace: axion-gen

api:
  replicaCount: 2

  image:
    repository: registry.momrah.gov.sa/urbi-omar/zero-release-api
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  ingress:
    enabled: true
    className: urbi
    annotations:
      nginx.ingress.kubernetes.io/use-regex: "true"
      nginx.ingress.kubernetes.io/enable-cors: "true"
      nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
      nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS, PATCH"
      nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,x-share-token"
      nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    hosts:
      - host: zero-release-api.momah.gov.sa
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - zero-release-api.momah.gov.sa

  certificate:
    enabled: false

  cors:
    allowedOrigins:
      - "https://axion-gen.momah.gov.sa"

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "2"

  migration:
    enabled: true
    backoffLimit: 3
    activeDeadlineSeconds: 120

  rotateKeys:
    enabled: false

# OIDC
