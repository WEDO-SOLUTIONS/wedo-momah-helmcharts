{{- if .Values.api.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.name }}-db-migration
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/component: db-migration
    app.kubernetes.io/managed-by: Helm
  annotations:
    "helm.sh/hook": post-install,pre-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.api.migration.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.api.migration.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.api.migration.ttlSecondsAfterFinished | default 86400 }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.name }}
        app.kubernetes.io/component: db-migration
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy | default "IfNotPresent" }}
          args: ["--migrate"]
          env:
            - name: Postgres__Host
              value: {{ required "postgres.api.host is required" .Values.postgres.api.host | quote }}
            - name: Postgres__Port
              value: {{ .Values.postgres.api.port | quote }}
            - name: Postgres__Database
              value: {{ required "postgres.api.database is required" .Values.postgres.api.database | quote }}
            - name: Postgres__Username
              value: {{ required "postgres.api.username is required" .Values.postgres.api.username | quote }}
            - name: Postgres__Password
              value: {{ required "postgres.api.password is required" .Values.postgres.api.password | quote }}
            - name: Postgres__MinPoolSize
              value: "1"
            - name: Postgres__MaxPoolSize
              value: "2"
            {{- range $key, $value := .Values.api.migration.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.api.migration.resources | nindent 12 }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
