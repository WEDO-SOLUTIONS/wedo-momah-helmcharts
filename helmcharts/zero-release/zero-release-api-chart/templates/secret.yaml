apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.name }}-secret
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}
    app.kubernetes.io/component: api
type: Opaque
stringData:
  Oidc__ClientId: {{ required "oidc.clientId is required" .Values.oidc.clientId | quote }}
  Oidc__ClientSecret: {{ required "oidc.clientSecret is required" .Values.oidc.clientSecret | quote }}
  Postgres__Password: {{ required "postgres.api.password is required" .Values.postgres.api.password | quote }}
  S3__AccessKey: {{ required "s3.accessKey is required" .Values.s3.accessKey | quote }}
  S3__SecretKey: {{ required "s3.secretKey is required" .Values.s3.secretKey | quote }}
  {{- range $version, $key := .Values.dataSources.encryption.keys }}
  {{ printf "DataSources__Encryption__Keys__%s" (toString $version) }}: {{ $key | quote }}
  {{- end }}
  {{- if .Values.ontologyApi.authToken }}
  OntologyApi__AuthToken: {{ .Values.ontologyApi.authToken | quote }}
  {{- end }}
  {{- range $i, $entry := .Values.api.apiKeys }}
  {{ printf "ApiKey__Keys__%d__Key" $i }}: {{ required "apiKeys[].key is required" $entry.key | quote }}
  {{ printf "ApiKey__Keys__%d__ServiceName" $i }}: {{ required "apiKeys[].serviceName is required" $entry.serviceName | quote }}
  {{- if $entry.userEmail }}
  {{ printf "ApiKey__Keys__%d__UserEmail" $i }}: {{ $entry.userEmail | quote }}
  {{- end }}
  {{- end }}
