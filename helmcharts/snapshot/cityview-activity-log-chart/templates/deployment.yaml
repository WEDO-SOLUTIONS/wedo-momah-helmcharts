apiVersion: apps/v1
kind: Deployment
metadata:
  name: cityview-activity-log
  namespace: urbi
  labels:
    app.kubernetes.io/instance: cityview-activity-log
    app.kubernetes.io/name: cityview-activity-log
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: cityview-activity-log
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: cityview-activity-log
        app.kubernetes.io/name: cityview-activity-log
    spec:
      serviceAccountName: activity-log
      containers:
        - name: cityview-activity-log
          image: registry.momrah.gov.sa/urbi-omar/cityview-activity-log:v0.0009
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "2000m"
              memory: "2048Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
