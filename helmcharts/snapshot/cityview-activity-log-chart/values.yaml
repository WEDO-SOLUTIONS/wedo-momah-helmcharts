# Default values - override with environment-specific files (prod-values.yaml, stg-values.yaml)
name: cityview-activity-log
namespace: urbi
replicaCount: 1

image: registry.momrah.gov.sa/urbi-omar/cityview-activity-log:latest
imagePullPolicy: IfNotPresent
containerPort: 8080
servicePort: 80
serviceType: ClusterIP

resources:
  limits:
    cpu: "1"
    memory: "1Gi"
  requests:
    cpu: "100m"
    memory: "256Mi"

# healthPath: /health

ingress:
  name: cityview-activity-log
  className: urbi
  host: cityview-activity-log.momrah.gov.sa
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS, PATCH"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,x-share-token"
  paths:
    - path: /
      pathType: ImplementationSpecific
      backend: cityview-activity-log

securityContext:
  enabled: false
