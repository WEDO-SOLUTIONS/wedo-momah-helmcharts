name: cv-landing-api
namespace: urbi
replicaCount: 1

image: registry.momrah.gov.sa/urbi-omar/cv-landing-api:v0.0.3
containerPort: 80
servicePort: 80
serviceType: ClusterIP

resources:
  limits:
    cpu: "1"
    memory: "1Gi"
  requests:
    cpu: "200m"
    memory: "256Mi"


env:
  PORT: "3000"
  # Redis Configuration
  REDIS_HOSTNAME: "redis-redis-cluster"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "CVb7saZB4Rtu"
  REDIS_USERNAME: "default"

# SSO / Auth Configuration
  CLIENT_ID: "Outbalady.balady.eye.pro"
  REDIRECT_URL: "https://cityview-pro.momah.gov.sa/cv-api/auth/callback"
  CLIENT_SECRET: "c2bf5ab3afa84766ada157e862b4b5f6"
  UI_URL: "https://cityview-pro.momah.gov.sa/"
  SSO_AUTH_URL: "https://ssoapp.balady.gov.sa/connect/authorize"
  SSO_TOKEN_URL: "https://ssoapp.balady.gov.sa/connect/token"

# Token Verification Configuration
  VERFIT_TOKEN_URL: "https://ssoapp.balady.gov.sa/.well-known/openid-configuration/jwks"
  VERFIT_ISSUER: "https://ssoapp.balady.gov.sa"

# External API Configuration
  BASE_URL: "https://cityview-pro-api-permissions.momah.gov.sa"
  CITYVIEW_BASE_URL: "https://cityview-pro-api-permissions.momah.gov.sa"
  CITYVIEW_AUTH_TOKEN: "28ed92f1-de4b-4060-b159-2dc19e9b8bf5"


# Ingress configuration for production
ingress: 
  name: cv-landing-api
  className: urbi
  host: cityview-pro.momah.gov.sa

  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,x-share-token"
    nginx.ingress.kubernetes.io/rewrite-target: "/$2"
  

  # Path rules
  paths:
    - path: /cv-api(/|$)(.*)
      pathType: ImplementationSpecific
      backend: cv-landing-api

securityContext:
  enabled: false

# --- Standard optional blocks (disabled by default) ------------------------
# These fields are supported by all snapshot charts for consistency. Override
# in env-specific values files (values/stg-values.yaml, values/prod-values.yaml)
# to enable.

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

serviceAccount:
  create: false
  name: ""
  annotations: {}
