# Default values - override with environment-specific files (prod-values.yaml, stg-values.yaml)
name: permissions-api
namespace: urbi
replicaCount: 1

image: registry.momrah.gov.sa/urbi-omar/permissions-api:latest
imagePullPolicy: IfNotPresent
containerPort: 8080
servicePort: 80
serviceType: ClusterIP

resources:
  limits:
    cpu: "1"
    memory: "1Gi"
  requests:
    cpu: "100m"
    memory: "256Mi"

# healthPath: /health

ingress:
  name: permissions-api
  className: urbi
  host: permissions-api.momrah.gov.sa
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS, PATCH"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,x-share-token"
  paths:
    - path: /
      pathType: ImplementationSpecific
      backend: permissions-api

securityContext:
  enabled: false

# --- Standard optional blocks (disabled by default) ------------------------
# These fields are supported by all snapshot charts for consistency. Override
# in env-specific values files (values/stg-values.yaml, values/prod-values.yaml)
# to enable.

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

serviceAccount:
  create: false
  name: ""
  annotations: {}
