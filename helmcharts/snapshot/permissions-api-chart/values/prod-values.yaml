name: cityview-custom-permissions-api
namespace: urbi
replicaCount: 1

image: registry.momrah.gov.sa/urbi-omar/cityview-custom-permissions-api:v1.1.7
containerPort: 8000
servicePort: 80
serviceType: ClusterIP

resources:
  limits:
    cpu: "1"
    memory: "1Gi"
  requests:
    cpu: "100m"
    memory: "128Mi"

# Ingress configuration for production
ingress:
  name: be-cityview-custom-permissions-api
  className: urbi
  host: cityview-pro-api-permissions.momah.gov.sa

  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, DELETE"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,x-share-token"

  # Path rules
  paths:
    - path: /ump/api/
      backend: cityview-custom-permissions-api

