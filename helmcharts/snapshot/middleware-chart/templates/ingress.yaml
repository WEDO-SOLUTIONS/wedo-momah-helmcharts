{{- $middlewareHost := printf "%s.%s.svc.cluster.local" .Values.name .Values.namespace }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.ingress.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Values.ingress.name }}
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: {{ .Values.ingress.name }}
  annotations:
{{ toYaml .Values.ingress.annotations | indent 4 }}
    nginx.ingress.kubernetes.io/server-snippet: |
          # Block swagger/version/metrics
          location ~* "^/swagger/" {
              deny all;
              return 403;
          }
          location ~* "^/version" {
              deny all;
              return 403;
          }
          location ~* "^/metrics" {
              deny all;
              return 403;
          }
          
          # Intercept dashboards - route to middleware with rewrite
          location ~ ^/v2/dashboards {
              client_max_body_size 500m;
              proxy_request_buffering off;
              proxy_read_timeout 300s;
              proxy_pass http://{{ $middlewareHost }}/middleware/api$request_uri;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }
          
          # Intercept /assets and /assets?ids=... metadata requests
          location ~ ^/assets {
              client_max_body_size 500m;
              proxy_request_buffering off;
              proxy_read_timeout 300s;
              proxy_pass http://{{ $middlewareHost }}/middleware/api$request_uri;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }
          
          # Intercept asset data endpoints
          location ~ ^/user_[^/]+/(items|tags|filters) {
              client_max_body_size 500m;
              proxy_request_buffering off;
              proxy_read_timeout 300s;
              proxy_pass http://{{ $middlewareHost }}/middleware/api$request_uri;
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
          }
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ingress.defaultBackendService }}
                port:
                  number: {{ .Values.ingress.defaultBackendPort }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
