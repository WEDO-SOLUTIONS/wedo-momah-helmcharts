name: cv-landing-api
namespace: urbi
replicaCount: 1

image: registry.momrah.gov.sa/urbi-omar/cv-landing-api:v0.0.2
containerPort: 80
servicePort: 80
serviceType: ClusterIP

resources:
  limits:
    cpu: "1"
    memory: "1Gi"
  requests:
    cpu: "200m"
    memory: "256Mi"


env:
  PORT: "3000"
  # Redis Configuration
  REDIS_HOSTNAME: "redis-redis-cluster"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "CVb7saZB4Rtu"
  REDIS_USERNAME: "default"

# SSO / Auth Configuration
  CLIENT_ID: "Outbalady.balady.eye.pro"
  REDIRECT_URL: "https://cityview-pro-ump.momah.gov.sa/cv-api/auth/callback"
  CLIENT_SECRET: "c2bf5ab3afa84766ada157e862b4b5f6"
  UI_URL: "https://cityview-pro.momah.gov.sa/"
  SSO_AUTH_URL: "https://ssoapp.balady.gov.sa/connect/authorize"
  SSO_TOKEN_URL: "https://ssoapp.balady.gov.sa/connect/token"

# Token Verification Configuration
