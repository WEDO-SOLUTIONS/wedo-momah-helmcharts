name: cv-landing-ui
namespace: urbi
replicaCount: 1

image: registry.momrah.gov.sa/urbi-omar/cv-landing-ui:v0.0.8
containerPort: 80
servicePort: 80
serviceType: ClusterIP

resources:
  limits:
    cpu: "1"
    memory: "1Gi"
  requests:
    cpu: "200m"
    memory: "256Mi"

env:
  VITE_API_BASE_URL: "https://cityview-pro.momah.gov.sa/cv-api"
  VITE_SKIP_AUTH_REDIRECT: "false"

# Ingress configuration for production
ingress: 
  name: cv-landing-ui
  className: urbi
  host: cityview-pro.momah.gov.sa

  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,x-share-token,x-error-screen"

  # Path rules
  paths:
    - path: /home
      backend: cv-landing-ui

securityContext:
  enabled: false

# --- Standard optional blocks (disabled by default) ------------------------
# These fields are supported by all snapshot charts for consistency. Override
# in env-specific values files (values/stg-values.yaml, values/prod-values.yaml)
# to enable.

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

serviceAccount:
  create: false
  name: ""
  annotations: {}
