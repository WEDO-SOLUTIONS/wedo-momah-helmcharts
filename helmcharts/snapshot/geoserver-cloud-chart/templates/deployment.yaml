{{- $services := list "geoserver-gateway" "geoserver-webui" "geoserver-rest" "geoserver-wms" "geoserver-wfs" "geoserver-wcs" "geoserver-gwc" "rabbitmq" -}}
{{- range $serviceName := $services }}
{{- $svc := index $.Values $serviceName }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $svc.name }}
  namespace: {{ $svc.namespace }}
  labels:
    app: {{ $svc.name }}
spec:
  replicas: {{ $svc.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ $svc.name }}
  template:
    metadata:
      labels:
        app: {{ $svc.name }}
    spec:
      containers:
        {{- range $containerName, $container := $svc.containers }}
        - name: {{ $containerName }}
          image: {{ $svc.image }}
          {{- if $svc.containerPort }}
          ports:
            - containerPort: {{ $svc.containerPort }}
          {{- else if $svc.containerPorts }}
          ports:
            {{- range $svc.containerPorts }}
            - name: {{ .name }}
              containerPort: {{ .port }}
            {{- end }}
          {{- end }}
          {{- if $container.env }}
          env:
            {{- range $envName, $envVal := $container.env }}
            - name: {{ $envName }}
              value: {{ $envVal.value | quote }}
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          {{- if $container.volumeMounts }}
          volumeMounts:
            {{- toYaml $container.volumeMounts | nindent 12 }}
          {{- end }}
        {{- end }}
      {{- $allVolumes := dict }}
      {{- range $containerName, $container := $svc.containers }}
        {{- if $container.volumeMounts }}
          {{- range $container.volumeMounts }}
            {{- $volName := .name }}
            {{- if and (kindIs "map" $.Values.volumes) (hasKey $.Values.volumes $volName) }}
              {{- $_ := set $allVolumes $volName (index $.Values.volumes $volName) }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- if $svc.volumes }}
        {{- range $svc.volumes }}
          {{- $_ := set $allVolumes .name . }}
        {{- end }}
      {{- end }}
      {{- if $allVolumes }}
      volumes:
        {{- range $volName, $vol := $allVolumes }}
        - name: {{ $volName }}
          {{- if $vol.persistentVolumeClaim }}
          persistentVolumeClaim:
            claimName: {{ $vol.persistentVolumeClaim.claimName }}
          {{- end }}
        {{- end }}
      {{- end }}
{{- end }}