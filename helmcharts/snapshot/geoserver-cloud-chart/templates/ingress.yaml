{{- if .Values.ingress }}
{{- $ing := .Values.ingress }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $ing.name }}
  namespace: {{ (index $.Values "geoserver-gateway").namespace }}
  annotations:
    {{- range $key, $value := $ing.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  ingressClassName: {{ $ing.className }}
  rules:
    - host: {{ $ing.host }}
      http:
        paths:
          {{- range $ing.paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ (index $.Values .backend).name }}
                port:
                  number: {{ (index $.Values .backend).servicePort }}
          {{- end }}
{{- end }}