rabbitmq:
  name: rabbitmq
  namespace: urbi
  replicaCount: 1
  image: rabbitmq:3-management
  containerPorts:
    - name: amqp
      port: 5672
    - name: management
      port: 15672
  servicePort: 5672
  serviceType: ClusterIP
  resources:
    limits:
      cpu: "1"
      memory: "1024Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
  containers:
    rabbitmq:
      env:
        RABBITMQ_DEFAULT_USER:
          value: user
        RABBITMQ_DEFAULT_PASS:
          value: QjecigobQuzUpIGc
      volumeMounts:
        - name: rabbitmq-data
          mountPath: /var/lib/rabbitmq
  volumes:
    - name: rabbitmq-data
      persistentVolumeClaim:
        claimName: rabbitmq-pvc

rabbitmq-pvc:
  enabled: true
  name: rabbitmq-pvc
  storageClassName: oci-block-volume
  accessModes:
    - ReadWriteOnce
  storage: 50Gi

volumes:
  geoserver-nfs-pvc:
    nfs:
      server: 10.246.35.54
      path: /mount-geotiff
      readOnly: false

ingress:
  name: geoserver-cloud
  className: urbi
  host: cityview.momah.gov.sa
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /geoserver/$2
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,x-share-token"
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Original-URI $request_uri;
  paths:
    - path: /geoserver(/|$)(.*)
      pathType: ImplementationSpecific
      backend: geoserver-gateway














