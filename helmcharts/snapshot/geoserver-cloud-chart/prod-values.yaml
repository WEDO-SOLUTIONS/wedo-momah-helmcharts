geoserver-gateway:
  name: geoserver-gateway
  namespace: urbi
  replicaCount: 1
  image: geoservercloud/geoserver-cloud-gateway:2.28.2.3
  containerPort: 8080
  servicePort: 80
  serviceType: ClusterIP
  resources:
    limits:
      cpu: "1"
      memory: "1024Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
  containers:
    spring:
      env:
        SPRING_PROFILES_ACTIVE:
          value: standalone,datadir
        GEOSERVER_BASE_PATH:
          value: /geoserver
        SERVER_USE_FORWARD_HEADERS:
          value: "true"
        SERVER_FORWARD_HEADERS_STRATEGY:
          value: framework
        SERVER_TOMCAT_REMOTEIP_PROTOCOL_HEADER:
          value: x-forwarded-proto
        SERVER_TOMCAT_REMOTEIP_REMOTE_IP_HEADER:
          value: x-forwarded-for
        SERVER_TOMCAT_REMOTEIP_PORT_HEADER:
          value: x-forwarded-port
        SERVER_TOMCAT_REMOTEIP_HOST_HEADER:
          value: x-forwarded-host
        PROXY_BASE_URL:
          value: https://cityview.momah.gov.sa/geoserver
        WEBUI_PROXY_BASE_URL:
          value: https://cityview.momah.gov.sa/geoserver/web
        SPRING_RABBITMQ_HOST:
          value: rabbitmq
        SPRING_RABBITMQ_PORT:
          value: "5672"
        SPRING_RABBITMQ_USERNAME:
          value: user
        SPRING_RABBITMQ_PASSWORD:
          value: QjecigobQuzUpIGc
        TARGETS_WEBUI:
          value: http://geoserver-webui:80
        TARGETS_WMS:
          value: http://geoserver-wms:80
        TARGETS_WFS:
          value: http://geoserver-wfs:80
        TARGETS_WCS:
          value: http://geoserver-wcs:80
        TARGETS_REST:
          value: http://geoserver-rest:80
        TARGETS_GWC:
          value: http://geoserver-gwc:80
        TARGETS_WPS:
          value: http://geoserver-wps:80

geoserver-webui:
  name: geoserver-webui
  namespace: urbi
  replicaCount: 1
  image: geoservercloud/geoserver-cloud-webui:2.28.2.3
  containerPort: 8080
  servicePort: 80
  serviceType: ClusterIP
  resources:
    limits:
      cpu: "1"
      memory: "1024Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
  containers:
    spring:
      env:
        SPRING_PROFILES_ACTIVE:
          value: standalone,datadir,kube
        GEOSERVER_CLOUD_EVENTBUS_ENABLED:
          value: "false"
        GEOSERVER_BASE_PATH:
          value: /geoserver
        SERVER_USE_FORWARD_HEADERS:
          value: "true"
        SERVER_FORWARD_HEADERS_STRATEGY:
          value: framework
        SERVER_TOMCAT_REMOTEIP_PROTOCOL_HEADER:
          value: x-forwarded-proto
        SERVER_TOMCAT_REMOTEIP_REMOTE_IP_HEADER:
          value: x-forwarded-for
        SERVER_TOMCAT_REMOTEIP_PORT_HEADER:
          value: x-forwarded-port
        SERVER_TOMCAT_REMOTEIP_HOST_HEADER:
          value: x-forwarded-host
        PROXY_BASE_URL:
          value: https://cityview.momah.gov.sa/geoserver
        WEBUI_PROXY_BASE_URL:
          value: https://cityview.momah.gov.sa/geoserver/web
        SPRING_RABBITMQ_HOST:
          value: rabbitmq
        SPRING_RABBITMQ_PORT:
          value: "5672"
        SPRING_RABBITMQ_USERNAME:
          value: user
        SPRING_RABBITMQ_PASSWORD:
          value: QjecigobQuzUpIGc
      volumeMounts:
        - mountPath: /opt/geoserver/data_dir
          name: geoserver-nfs-pvc

