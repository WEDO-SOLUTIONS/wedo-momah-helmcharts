# Default values for geoserver-cloud
# This chart deploys multiple geoserver services
# Override with environment-specific values files

geoserver-gateway:
  name: geoserver-gateway
  namespace: urbi
  replicaCount: 1
  image: geoserver-cloud:latest
  containerPort: 8080
  resources:
    limits:
      cpu: "2"
      memory: "2Gi"
    requests:
      cpu: "200m"
      memory: "512Mi"
  containers:
    gateway: {}

volumes: {}

# --- Standard optional blocks (disabled by default) ------------------------
# These fields are supported by all snapshot charts for consistency. Override
# in env-specific values files (values/stg-values.yaml, values/prod-values.yaml)
# to enable.

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}

serviceAccount:
  create: false
  name: ""
  annotations: {}
