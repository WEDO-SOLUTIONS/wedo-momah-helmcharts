# Default values - override with environment-specific files (prod-values.yaml, stg-values.yaml)
name: cityview-ai
namespace: urbi
replicaCount: 1

image: registry.momrah.gov.sa/urbi-omar/cityview-ai:latest
imagePullPolicy: IfNotPresent
containerPort: 8000
servicePort: 80
serviceType: ClusterIP

resources:
  limits:
    cpu: "1"
    memory: "1Gi"
  requests:
    cpu: "100m"
    memory: "256Mi"

# healthCheck:
#   readiness:
#     path: /health
#     initialDelaySeconds: 10
#     periodSeconds: 10
#   liveness:
#     path: /health
#     initialDelaySeconds: 30
#     periodSeconds: 20
appVersion: "development"

ingress:
  name: cityview-ai
  className: urbi
  host: cityview-ai.momrah.gov.sa
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS, PATCH"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,x-share-token"
  paths:
    - path: /
      pathType: ImplementationSpecific
      backend: cityview-ai
