# ============================================================
# JupyterHub — Official Zero to JupyterHub Helm chart values
# https://hub.jupyter.org/helm-chart/
#
# Deploy:
#   helm repo add jupyterhub https://hub.jupyter.org/helm-chart/
#   helm repo update
#   helm upgrade --install jupyterhub jupyterhub/jupyterhub \
#     --namespace jupyterhub --create-namespace \
#     --version 3.3.7 \
#     --values values.yaml \
#     --timeout 15m
# ============================================================


# ── Hub ──────────────────────────────────────────────────────
hub:
  baseUrl: /jupyterhub    # serves under /jupyterhub path, matching your ingress

  config:
    JupyterHub:
      admin_access: true
      authenticator_class: nativeauthenticator.NativeAuthenticator
    NativeAuthenticator:
      open_signup: false          # users must be approved by admin before login
      minimum_password_length: 10
      check_common_password: true
      create_system_users: true   # auto-create DB entries for users defined in admin_users/allowed_users
    Authenticator:
      admin_users:
        - admin                   # replace with actual admin username(s)
  extraConfig:
    nativeauthenticator: |
      import nativeauthenticator
      c.JupyterHub.template_paths = [f"{nativeauthenticator.__path__[0]}/templates/"]

  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "8Gi"


# ── Proxy ────────────────────────────────────────────────────
proxy:
  secretToken: "3e82ee0d9507bec01a26145cf84381124b6822757571534c33ffd7ecb4389cd1"
  chp:
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "2"
        memory: "2Gi"


# ── Single-User Notebook Servers ─────────────────────────────
# Each user gets their own isolated pod with dedicated resources.
# datascience-notebook ships with: numpy, pandas, scipy,
# scikit-learn, matplotlib, seaborn, statsmodels, and more.
singleuser:
  defaultUrl: "/lab"       # open JupyterLab instead of classic Notebook

  image:
    name: jupyter/datascience-notebook
    tag: python-3.11
    pullPolicy: IfNotPresent

  cpu:
    limit: 16
    guarantee: 2           # guaranteed cores on spawn; can burst to 16

  memory:
    limit: 32G
    guarantee: 4G          # guaranteed RAM on spawn; can burst to 32G

  # Dynamic PVC per user — each user gets their own OCI Block Volume.
  # Avoids the ReadWriteOnce sharing problem of a single shared PVC.
  storage:
    type: dynamic
    capacity: 50Gi
    homeMountPath: /home/jovyan
    dynamic:
      storageClass: oci-bv           # OCI Block Volume storage class
      pvcNameTemplate: "claim-{username}{servername}"
      volumeNameTemplate: "volume-{username}{servername}"
      storageAccessModes:
        - ReadWriteOnce

  # OKE nodes don't allow iptables manipulation inside pods (NET_ADMIN
  # is restricted), so disable the cloud-metadata blocking init container.
  cloudMetadata:
    blockWithIptables: false

  # Allow users to install packages without sudo issues
  extraEnv:
    GRANT_SUDO: "yes"


# ── Idle Culling ─────────────────────────────────────────────
# Shuts down idle servers to free up OKE node resources.
# 4-hour timeout suits heavy processing workloads.
cull:
  enabled: true
  timeout: 14400           # seconds idle before shutdown (4 hours)
  every: 600               # check interval in seconds
  maxAge: 0                # 0 = no max lifetime limit


# ── Ingress ──────────────────────────────────────────────────
# Uses your existing urbi ingress class, matching the pattern
# used across other services in the cluster.
ingress:
  enabled: true
  ingressClassName: urbi
  hosts:
    - cityview-jupyterhub.momah.gov.sa
  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "POST, GET, OPTIONS, PUT, DELETE"
    nginx.ingress.kubernetes.io/cors-allow-headers: >-
      DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,
      Cache-Control,Content-Type,Range,Authorization,x-share-token
    # Long timeouts for notebook operations and large data transfers
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
  pathSuffix: ""
  pathType: Prefix
