apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.serviceType }}
  ports:
    - name: http
      port: {{ .Values.servicePort }}
      targetPort: {{ .Values.containerPort }}
  selector:
    app.kubernetes.io/name: {{ .Values.name }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}-proxy
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.proxy.serviceType }}
  ports:
    - name: http
      port: {{ .Values.proxy.servicePort }}
      targetPort: {{ .Values.proxy.containerPort }}
  selector:
    app.kubernetes.io/name: {{ .Values.name }}-proxy
