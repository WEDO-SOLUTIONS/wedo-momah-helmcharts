# ── Hub Service ────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}-svc
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.name }}
spec:
  type: {{ .Values.serviceType }}
  selector:
    app: {{ .Values.name }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.servicePort }}
      targetPort: {{ .Values.containerPort }}

---
# ── Proxy Service ──────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}-proxy-svc
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.name }}-proxy
spec:
  type: {{ .Values.proxy.serviceType }}
  selector:
    app: {{ .Values.name }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.proxy.servicePort }}
      targetPort: {{ .Values.proxy.containerPort }}