apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.name }}
    spec:
      containers:
        # ── Hub container ──────────────────────────────────────────
        - name: hub
          image: {{ .Values.image }}
          ports:
            - containerPort: {{ .Values.containerPort }}
          env:
            - name: JUPYTERHUB_CRYPT_KEY
              value: {{ .Values.env.JUPYTERHUB_CRYPT_KEY | quote }}
            - name: PROXY_SECRET_TOKEN
              value: {{ .Values.env.PROXY_SECRET_TOKEN | quote }}
          resources:
            limits:
              cpu: {{ .Values.resources.limits.cpu | quote }}
              memory: {{ .Values.resources.limits.memory }}
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
          volumeMounts:
            - name: jupyterhub-storage
              mountPath: {{ .Values.singleuser.storage.homeMountPath }}
              subPath: hub

        # ── Proxy (CHP) container ──────────────────────────────────
        - name: proxy
          image: {{ .Values.proxy.image }}
          ports:
            - containerPort: {{ .Values.proxy.containerPort }}
          env:
            - name: CONFIGPROXY_AUTH_TOKEN
              value: {{ .Values.env.PROXY_SECRET_TOKEN | quote }}
          resources:
            limits:
              cpu: {{ .Values.proxy.resources.limits.cpu }}
              memory: {{ .Values.proxy.resources.limits.memory }}
            requests:
              cpu: {{ .Values.proxy.resources.requests.cpu }}
              memory: {{ .Values.proxy.resources.requests.memory }}

      volumes:
        - name: jupyterhub-storage
          persistentVolumeClaim:
            claimName: {{ .Values.pvc.name }}