apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.name }}   # ← FIXED: was app: {{ .Values.name }}
spec:
  type: {{ .Values.serviceType }}
  selector:
    app.kubernetes.io/name: {{ .Values.name }}   # ← FIXED: was app: {{ .Values.name }}
  ports:
    - name: http
      port: {{ .Values.servicePort }}
      targetPort: {{ .Values.containerPort }}     # ← already correct (maps 80 → 3000)
      protocol: TCP