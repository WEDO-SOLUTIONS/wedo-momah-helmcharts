# Ingress configuration for production
ingress:
  name: short-link
  className: urbi
  host: urbi-lifestyle-stg.momrah.gov.sa

  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,x-share-token,x-api-key"
    nginx.ingress.kubernetes.io/rewrite-target: "$2"

  # Path rules
  paths:
    - path: /1.0/short(/|$)(.*)
      pathType: ImplementationSpecific
      backend: short-link
