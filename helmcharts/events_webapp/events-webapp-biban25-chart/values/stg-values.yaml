# Release metadata
name: events-webapp-biban25
namespace: urbi
replicaCount: 1

# Docker image configuration (staging)
image: registry.momrah.gov.sa/urbi-omar/events-webapp-biban25-stg:v1.1.5
containerPort: 80
servicePort: 80
serviceType: ClusterIP

# Resource requests & limits (staging)
resources:
  limits:
    cpu: "2"
    memory: "2Gi"
  requests:
    cpu: "100m"
    memory: "256Mi"

# Ingress configuration for staging
ingress:
  name: events-webapp-biban25
  className: urbi
  host: urbi-lifestyle-stg.momrah.gov.sa

  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS, PATCH"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,x-share-token"

  paths:
    - path: /biban25
      backend: events-webapp-biban25

