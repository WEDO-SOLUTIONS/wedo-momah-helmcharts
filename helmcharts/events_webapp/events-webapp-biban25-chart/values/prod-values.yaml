# Release metadata
name: events-webapp-biban25
namespace: urbi
replicaCount: 5

# Docker image configuration (production)
image: registry.momrah.gov.sa/urbi-omar/events-webapp-biban25-prod:v1.2.3
containerPort: 80
servicePort: 80
serviceType: ClusterIP

# Resource requests & limits (production)
resources:
  limits:
    cpu: "1"
    memory: "512Mi"
  requests:
    cpu: "100m"
    memory: "256Mi"

# Ingress configuration for production
ingress:
  name: events-webapp-biban25
  className: urbi
  host: urbi-lifestyle.momrah.gov.sa

  annotations:
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS, PATCH"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,x-share-token"

  paths:
    - path: /biban25
      backend: events-webapp-biban25

